services:
  pet-shop-curso:
    build:
      context: .
    container_name: pet-shop-curso
    restart: unless-stopped
    networks:
      - dhlabs-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pet-shop-curso.rule=Host(`pet-shop.dhlabs.cl`)"
      - "traefik.http.routers.pet-shop-curso.entrypoints=web"
      - "traefik.http.services.pet-shop-curso.loadbalancer.server.port=80"

networks:
  dhlabs-network:
    external: true
